{% if books %}
  {% for book in books %}
  <div class="book-item">
    <button
      class="book-row"
      type="button"
      style="width: 100%; text-align: left; background: transparent; border: 0; cursor: pointer;"
      hx-get="/books/{{ book.id }}"
      hx-target="#popup-root"
      hx-swap="innerHTML"
    >
      <div class="book-meta">
        <div class="book-title">{{ book.title }}</div>
        <div class="book-info">
          <span>{{ book.authors | join(sep=", ") | default(value="—") }}</span>
          <span>Formato: {{ book.format | default(value="—") }}</span>
          <span>Serie: {{ book.series | default(value="—") }}</span>
        </div>
      </div>
    </button>
  </div>
  {% endfor %}
{% else %}
<div class="book-item">
  <div class="book-row">
    <div class="book-meta">
      <div class="book-title">Nessun libro nel database.</div>
    </div>
  </div>
</div>
{% endif %}
