{% extends "base.html" %}

{% block title %}{{ title }} — Ritmo{% endblock %}

{% block content %}
<h1>{{ title }}</h1>

<p id="page-error" hidden><strong>Errore:</strong> <span id="page-error-text"></span></p>

{% if items %}
<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for item in items %}
    <tr>
      <td>{{ item.label }}</td>
      <td><button type="button" class="delete-button" data-url="{{ item.delete_path }}" data-name="{{ item.label }}">Elimina</button></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p>{{ empty_message }}</p>
{% endif %}

<script>
const pageError = document.getElementById('page-error');
const pageErrorText = document.getElementById('page-error-text');

for (const button of document.querySelectorAll('.delete-button')) {
  button.addEventListener('click', async function () {
    const name = button.dataset.name || 'questo elemento';
    if (!window.confirm(`Confermi l'eliminazione di "${name}"?`)) return;
    const response = await fetch(button.dataset.url, { method: 'DELETE', headers: { Accept: 'application/json' } });
    if (response.ok) {
      window.location.reload();
      return;
    }
    let message = 'Operazione non riuscita.';
    try {
      const data = await response.json();
      if (data.error) message = data.error;
    } catch (_error) {
      const text = await response.text();
      if (text) message = text;
    }
    pageError.hidden = false;
    pageErrorText.textContent = message;
  });
}
</script>
{% endblock %}
