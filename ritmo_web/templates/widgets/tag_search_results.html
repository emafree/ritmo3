{% if results | length > 0 %}
  {% for result in results %}
  <form
    class="content-row"
    style="padding-left: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface);"
    hx-post="/{{ tag_entity_type }}/{{ tag_entity_id }}/tags"
    hx-target="#tag-list-{{ tag_entity_type }}-{{ tag_entity_id }}"
    hx-swap="beforeend"
  >
    <input type="hidden" name="tag_id" value="{{ result.id }}">
    <span class="content-title">{{ result.name }} <small style="opacity:.6;">({{ result.tag_type }})</small></span>
    <button class="book-action" type="submit">Collega</button>
  </form>
  {% endfor %}
{% endif %}
{% if create_name %}
<form
  class="content-row"
  style="padding-left: 14px; border: 1px dashed var(--border); border-radius: 6px;"
  hx-post="/{{ tag_entity_type }}/{{ tag_entity_id }}/tags"
  hx-target="#tag-list-{{ tag_entity_type }}-{{ tag_entity_id }}"
  hx-swap="beforeend"
>
  <input type="hidden" name="tag_name" value="{{ create_name }}">
  <input type="hidden" name="tag_type" value="personal">
  <span class="content-title">Crea &ldquo;{{ create_name }}&rdquo;</span>
  <button class="book-action" type="submit">Crea e collega</button>
</form>
{% endif %}
{% if not results | length > 0 and not create_name %}
<div class="content-row" style="padding-left: 14px; border: 1px dashed var(--border); border-radius: 6px;">
  <span class="content-title">Nessun risultato.</span>
</div>
{% endif %}
