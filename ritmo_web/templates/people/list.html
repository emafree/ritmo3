{% extends "base.html" %}
{% block title %}Persone — Ritmo{% endblock title %}
{% block content %}
<div class="results-header">
  <div class="results-count">{{ people | length }} risultati</div>
  <button
    class="topbar-btn primary"
    type="button"
    hx-get="/people/new"
    hx-target="#popup-root"
    hx-swap="innerHTML"
  >
    + Nuova persona
  </button>
</div>
<div id="people-list">
  {% include "people/list_rows.html" %}
</div>
{% endblock content %}
